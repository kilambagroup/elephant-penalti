<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🐘 ELEPHANT PENALTI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
    background: #2a0418;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  #game {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 50% 0%, #7a1248 0%, #2a0418 72%);
  }
  canvas {
    display: block;
    background: #2d8a4e;
    box-shadow: 0 0 70px rgba(255, 90, 160, 0.45);
    max-width: 100%;
    max-height: 100%;
  }

  /* HUD */
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 14px 18px;
    pointer-events: none;
    z-index: 10;
  }
  .pill {
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(6px);
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 999px;
    padding: 8px 18px;
    color: #fff;
    font-weight: 800;
    font-size: clamp(16px, 4.5vw, 26px);
    letter-spacing: 0.5px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    white-space: nowrap;
  }
  #score .label, #timer .label { font-size: 0.55em; opacity: 0.8; display:block; line-height:1; margin-bottom:2px; }
  #timer.urgent { border-color: #ff5470; color: #ff8fa3; animation: pulse 0.5s infinite alternate; }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.08); } }

  /* Overlays */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: rgba(20, 8, 40, 0.82);
    backdrop-filter: blur(8px);
    z-index: 20;
    padding: 24px;
  }
  .overlay.hidden { display: none; }
  /* Secondary button (view ranking from the start screen) */
  .btn.btn-secondary {
    margin-top: 14px;
    padding: 6px 10px;
    font-size: clamp(13px, 3.4vw, 16px);
    font-weight: 700;
    color: #b9a6e0;
    background-image: none;
    background-color: transparent;
    border: none;
    box-shadow: none;
    text-transform: none;
    letter-spacing: 0.3px;
    text-decoration: underline;
    text-underline-offset: 3px;
    opacity: 0.85;
  }
  .btn.btn-secondary:hover { opacity: 1; color: #d9c9ff; }
  .btn.btn-secondary:active { transform: translateY(1px); box-shadow: none; }
  #startScreen .btn-secondary { position: relative; z-index: 1; }

  /* Ranking + End screens: anchor to top + scroll so the full Top 10 is visible. */
  #rankingScreen { justify-content: flex-start; overflow-y: auto; padding-top: 18px; padding-bottom: 18px; }
  #rankingScreen .title { font-size: clamp(28px, 8vw, 54px); margin-bottom: 14px; }
  #rankingBoard { width: min(340px, 82vw); margin-bottom: 16px; }
  #endScreen { justify-content: flex-start; overflow-y: auto; padding-top: 18px; padding-bottom: 18px; }
  #endScreen .title { font-size: clamp(28px, 8vw, 54px); margin-bottom: 4px; }
  #finalScore { font-size: clamp(18px,5vw,28px); }
  #leaderboard { margin-bottom: 16px; }

  /* Start screen: center the whole block, nudged a bit upward. */
  #startScreen { justify-content: flex-start; overflow-y: auto; padding-top: 0; }
  #startScreen .hero-mascot { margin-top: -50px; }
  /* Lower ONLY the elephant (visual shift, doesn't move the text below) so the
     whole head is visible. */
  /* Scale the elephant +30% from the top of its head (visual only — keeps both
     the head-top position and the text layout fixed). */
  .hero-mascot { transform-origin: center top; transform: translateY(110px) scale(1.3); }
  .title {
    font-size: clamp(34px, 11vw, 86px);
    font-weight: 900;
    background: linear-gradient(90deg, #ffb3d9, #ff4f9e, #ff85c2);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    line-height: 1;
    margin-bottom: 8px;
    filter: drop-shadow(0 4px 0 rgba(0,0,0,0.3));
  }
  .subtitle { font-size: clamp(15px, 4vw, 22px); color: #d9c9ff; margin-bottom: 26px; max-width: 560px; }
  .big-emoji { font-size: clamp(60px, 18vw, 130px); margin-bottom: 6px; animation: bob 1.6s ease-in-out infinite; }
  .hero-mascot {
    height: clamp(360px, 58vh, 700px);
    width: auto;
    max-width: 96vw; /* never overflow sideways on narrow screens */
    margin-bottom: -120px; /* let the title overlap the lower body */
    position: relative;
    z-index: 0;
    /* fade the lower body out so it blends behind the title text */
    -webkit-mask-image: linear-gradient(to bottom, #000 32%, transparent 58%);
    mask-image: linear-gradient(to bottom, #000 32%, transparent 58%);
  }
  #startScreen .title,
  #startScreen .subtitle,
  #startScreen .btn,
  #startScreen .controls-hint { position: relative; z-index: 1; }
  @keyframes bob { 0%,100% { transform: translateY(0) rotate(-3deg);} 50% { transform: translateY(-14px) rotate(3deg);} }
  .btn {
    pointer-events: auto;
    cursor: pointer;
    border: none;
    border-radius: 999px;
    padding: 16px 44px;
    font-size: clamp(18px, 5vw, 28px);
    font-weight: 900;
    color: #ffffff;
    background: linear-gradient(135deg, #ff4f9e, #d6186b);
    box-shadow: 0 6px 0 #9c0e4c, 0 10px 24px rgba(255,79,158,0.55);
    transition: transform 0.08s, box-shadow 0.08s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #9c0e4c, 0 4px 12px rgba(255,79,158,0.5); }
  .controls-hint {
    margin-top: 24px;
    color: #b9a6e0;
    font-size: clamp(13px, 3.4vw, 17px);
    line-height: 1.7;
  }
  .controls-hint kbd {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-bottom-width: 3px;
    border-radius: 6px;
    padding: 2px 9px;
    font-family: inherit;
    font-weight: 700;
    color: #fff;
    margin: 0 2px;
  }
  #finalScore { font-size: clamp(20px,6vw,34px); color:#ff85c2; font-weight:900; margin-bottom: 16px; }

  /* Leaderboard */
  #leaderboard {
    width: min(340px, 82vw);
    margin-bottom: 24px;
  }
  .lb-title {
    font-size: clamp(15px,4vw,20px);
    font-weight: 900;
    color: #ffb3d9;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .lb-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 9px 16px;
    margin-bottom: 7px;
    color: #fff;
    font-weight: 700;
    font-size: clamp(15px,4vw,19px);
  }
  .lb-row.lb-new {
    background: linear-gradient(135deg, rgba(255,79,158,0.4), rgba(214,24,107,0.35));
    border-color: #ff85c2;
    box-shadow: 0 0 18px rgba(255,79,158,0.5);
  }
  .lb-rank { width: 26px; text-align: center; font-size: 1.05em; flex-shrink: 0; }
  .lb-name { flex: 1; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lb-pending { opacity: 0.5; letter-spacing: 2px; }
  .lb-score { flex-shrink: 0; text-align: right; opacity: 0.92; font-variant-numeric: tabular-nums; }
  .lb-tag {
    background: #ff4f9e;
    color: #fff;
    font-size: 0.72em;
    font-weight: 900;
    padding: 2px 10px;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .lb-empty { color:#b9a6e0; font-size: clamp(13px,3.4vw,16px); padding: 8px 0; }

  /* Name entry (Top 10) */
  #nameEntry { width: min(340px, 82vw); margin-bottom: 18px; }
  #nameEntry.hidden { display: none; }
  .ne-label { color: #ffd23f; font-weight: 800; font-size: clamp(13px,3.6vw,16px); margin-bottom: 10px; }
  .ne-row { display: flex; gap: 8px; }
  #nameInput {
    flex: 1; min-width: 0;
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.12);
    color: #fff;
    font-family: inherit; font-weight: 700;
    font-size: clamp(15px,4vw,18px);
    padding: 11px 15px;
    outline: none;
  }
  #nameInput:focus { border-color: #ff85c2; box-shadow: 0 0 14px rgba(255,79,158,0.45); }
  #nameInput::placeholder { color: rgba(255,255,255,0.5); }
  #saveNameBtn {
    border: none; border-radius: 12px;
    padding: 0 22px;
    font-family: inherit; font-weight: 900; font-size: clamp(15px,4vw,18px);
    color: #fff; cursor: pointer;
    background: linear-gradient(135deg, #ff4f9e, #d6186b);
    box-shadow: 0 4px 0 #9c0e4c;
  }
  #saveNameBtn:active { transform: translateY(2px); box-shadow: 0 2px 0 #9c0e4c; }

  /* Mobile touch controls */
  #touch {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    display: none;
    justify-content: space-between;
    align-items: flex-end;
    padding: 0 18px 22px;
    z-index: 15;
    pointer-events: none;
  }
  #touch.show { display: flex; }
  .tbtn {
    pointer-events: auto;
    width: 78px; height: 78px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    border: 3px solid rgba(255,255,255,0.4);
    backdrop-filter: blur(4px);
    color: #fff;
    font-size: 34px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    transition: transform 0.06s, background 0.06s;
  }
  .tbtn:active { transform: scale(0.9); background: rgba(255,255,255,0.3); }
  #shootBtn {
    width: 96px; height: 96px;
    font-size: 22px; font-weight: 900;
    background: linear-gradient(135deg, #ff4f9e, #d6186b);
    border-color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .move-group { display: flex; gap: 14px; }
</style>
</head>
<body>
<div id="game">
  <canvas id="canvas"></canvas>

  <div id="hud">
    <div class="pill" id="score"><span class="label">GOLOS</span><span id="scoreVal">0</span></div>
    <div class="pill" id="timer"><span class="label">TEMPO</span><span id="timerVal">60</span></div>
  </div>

  <!-- Start screen -->
  <div class="overlay" id="startScreen">
    <img class="hero-mascot" src="mascotte_trim.png" alt="Mascotte éléphant footballeur">
    <div class="title">ELEPHANT PENALTI</div>
    <div class="subtitle">Marca o máximo de golos em <b>1 minuto</b>&nbsp;!<br>Move o elefante, aponta para o canto oposto ao guarda-redes e remata&nbsp;!</div>
    <button class="btn" id="startBtn">Jogar ▶</button>
    <div class="controls-hint" id="pcHint">
      <kbd>◀</kbd> <kbd>▶</kbd> mover &nbsp;•&nbsp; <kbd>Espaço</kbd> rematar
    </div>
    <button class="btn btn-secondary" id="rankingBtn">🏆 Classificação</button>
  </div>

  <!-- Ranking screen -->
  <div class="overlay hidden" id="rankingScreen">
    <div class="title">Classificação</div>
    <div id="rankingBoard"></div>
    <button class="btn" id="rankingBackBtn">◀ Voltar</button>
  </div>

  <!-- End screen -->
  <div class="overlay hidden" id="endScreen">
    <div class="title">Acabou&nbsp;!</div>
    <div id="finalScore">0 golos</div>
    <div id="nameEntry" class="hidden">
      <div class="ne-label">🎉 Entraste no Top 10 ! Escreve o teu nome :</div>
      <div class="ne-row">
        <input id="nameInput" type="text" maxlength="12" placeholder="O teu nome" autocomplete="off" spellcheck="false">
        <button id="saveNameBtn">OK</button>
      </div>
    </div>
    <div id="leaderboard"></div>
    <button class="btn" id="replayBtn">Jogar de novo 🔄</button>
  </div>

  <!-- Touch controls -->
  <div id="touch">
    <div class="move-group">
      <div class="tbtn" id="leftBtn">◀</div>
      <div class="tbtn" id="rightBtn">▶</div>
    </div>
    <div class="tbtn" id="shootBtn">REMATE</div>
  </div>
</div>

<script>
(function () {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  // Logical resolution (portrait-friendly). We scale to fit.
  const W = 480, H = 720;
  canvas.width = W; canvas.height = H;

  function fit() {
    const pad = 0;
    const availW = window.innerWidth - pad;
    const availH = window.innerHeight - pad;
    const scale = Math.min(availW / W, availH / H);
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }
  window.addEventListener('resize', fit);
  fit();

  // ---- Game state ----
  const GAME_TIME = 60; // seconds
  let state = 'start'; // start | playing | over
  let score = 0;
  let timeLeft = GAME_TIME;
  let lastTime = 0;
  let flashes = []; // floating texts

  // Field geometry
  const GOAL = { x: 60, y: 90, w: W - 120, h: 120, postY: 210 };
  const SHOOT_LINE = H - 140; // elephant y baseline

  // Pitch logo (watermark)
  const logoImg = new Image();
  let logoReady = false;
  logoImg.onload = () => { logoReady = true; };
  logoImg.src = 'Tete%20blanche.png';

  // Goalkeeper sprite
  const keeperImg = new Image();
  let keeperReady = false;
  keeperImg.onload = () => { keeperReady = true; };
  keeperImg.src = 'gardien_trim.png';

  // Shooter (player) sprite — back view
  const playerImg = new Image();
  let playerReady = false;
  playerImg.onload = () => { playerReady = true; };
  playerImg.src = 'joueur_trim.png';

  // Elephant (shooter)
  const ele = { x: W/2, w: 96, h: 96, speed: 320, dir: 0 };

  // Goalkeeper
  const keeper = {
    x: W/2, w: 70, h: 78,
    centerX: W/2, range: GOAL.w/2 - 24,
    t: 0, speed: 1.4 + Math.random()*0.6, phase: Math.random()*Math.PI*2,
  };

  // Ball
  const ball = {
    x: W/2, y: SHOOT_LINE, vx: 0, vy: 0, r: 18,
    moving: false, scale: 1,
  };

  // Input
  const keys = { left: false, right: false };
  let shootQueued = false;

  function resetBall() {
    ball.moving = false;
    ball.x = ele.x;
    ball.y = SHOOT_LINE;
    ball.vx = 0; ball.vy = 0;
    ball.scale = 1;
  }

  function startGame() {
    // If a Top-10 score is still awaiting a name, persist it before leaving
    if (pendingScore != null) saveName();
    state = 'playing';
    score = 0;
    timeLeft = GAME_TIME;
    ele.x = W/2;
    resetBall();
    flashes = [];
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('endScreen').classList.add('hidden');
    document.getElementById('scoreVal').textContent = '0';
    updateTimerUI();
    lastTime = 0;
    requestAnimationFrame(loop);
  }

  const MAX_BOARD = 10;
  let pendingScore = null; // score awaiting a name when it reaches the Top 10

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  function loadBoard() {
    let raw = [];
    try { raw = JSON.parse(localStorage.getItem('elephantBoard') || '[]'); } catch (e) { raw = []; }
    return raw
      .filter(b => b && typeof b.score === 'number')
      .map(b => ({ name: (b.name || '').toString(), score: b.score }))
      .sort((a, b) => b.score - a.score)
      .slice(0, MAX_BOARD);
  }

  function saveBoard(board) {
    localStorage.setItem('elephantBoard',
      JSON.stringify(board.slice(0, MAX_BOARD).map(b => ({ name: b.name, score: b.score }))));
  }

  function boardHtml(rows) {
    const medals = ['🥇', '🥈', '🥉'];
    let html = '<div class="lb-title">🏆 Melhores pontuações</div>';
    if (!rows.length) {
      html += '<div class="lb-empty">Ainda sem pontuações</div>';
    } else {
      html += rows.map((b, i) => {
        const rank = medals[i] || (i + 1) + '.';
        const unit = b.score > 1 ? 'golos' : 'golo';
        const name = b.name ? escapeHtml(b.name) : '<span class="lb-pending">…</span>';
        const tag = b.isNew ? '<span class="lb-tag">tu</span>' : '';
        return '<div class="lb-row' + (b.isNew ? ' lb-new' : '') + '">' +
                 '<span class="lb-rank">' + rank + '</span>' +
                 '<span class="lb-name">' + name + '</span>' +
                 '<span class="lb-score">' + b.score + ' ' + unit + '</span>' +
                 tag +
               '</div>';
      }).join('');
    }
    return html;
  }

  function renderBoard(rows) {
    document.getElementById('leaderboard').innerHTML = boardHtml(rows);
  }

  function showRanking() {
    const rows = loadBoard().map(b => ({ name: b.name, score: b.score, isNew: false }));
    document.getElementById('rankingBoard').innerHTML = boardHtml(rows);
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('rankingScreen').classList.remove('hidden');
  }

  function hideRanking() {
    document.getElementById('rankingScreen').classList.add('hidden');
    document.getElementById('startScreen').classList.remove('hidden');
  }

  function withEntry(board, entry) {
    const rows = board.map(b => ({ name: b.name, score: b.score, isNew: false }));
    rows.push(entry);
    rows.sort((a, b) => b.score - a.score);
    return rows.slice(0, MAX_BOARD);
  }

  function endGame() {
    state = 'over';
    document.getElementById('finalScore').textContent =
      score + (score > 1 ? ' golos' : ' golo');

    const board = loadBoard();
    const qualifies = score > 0 &&
      (board.length < MAX_BOARD || score > board[board.length - 1].score);
    const nameEntry = document.getElementById('nameEntry');

    if (qualifies) {
      pendingScore = score;
      renderBoard(withEntry(board, { name: '', score: score, isNew: true }));
      nameEntry.classList.remove('hidden');
      const input = document.getElementById('nameInput');
      input.value = '';
      setTimeout(() => { try { input.focus(); } catch (e) {} }, 60);
    } else {
      pendingScore = null;
      nameEntry.classList.add('hidden');
      renderBoard(board.map(b => ({ name: b.name, score: b.score, isNew: false })));
    }
    document.getElementById('endScreen').classList.remove('hidden');
  }

  function saveName() {
    if (pendingScore == null) return;
    let name = (document.getElementById('nameInput').value || '').trim().slice(0, 12);
    if (!name) name = 'Anónimo';

    let board = loadBoard();
    board.push({ name: name, score: pendingScore });
    board.sort((a, b) => b.score - a.score);
    board = board.slice(0, MAX_BOARD);
    saveBoard(board);

    // Highlight the entry we just saved (first match by name + score)
    let flagged = false;
    const rows = board.map(b => {
      const isNew = !flagged && b.name === name && b.score === pendingScore;
      if (isNew) flagged = true;
      return { name: b.name, score: b.score, isNew: isNew };
    });
    renderBoard(rows);
    document.getElementById('nameEntry').classList.add('hidden');
    pendingScore = null;
  }

  function shoot() {
    if (state !== 'playing' || ball.moving) return;
    ball.moving = true;
    // Aim straight up from current elephant position, slight random curve
    const targetY = GOAL.postY - 10;
    const dist = ball.y - targetY;
    const power = 620; // px/s upward
    ball.vy = -power;
    // small horizontal drift for skill/variety
    ball.vx = (Math.random() - 0.5) * 90;
  }

  function updateTimerUI() {
    const tv = document.getElementById('timerVal');
    tv.textContent = Math.ceil(timeLeft);
    const timer = document.getElementById('timer');
    if (timeLeft <= 10) timer.classList.add('urgent');
    else timer.classList.remove('urgent');
  }

  function addFlash(text, x, y, color) {
    flashes.push({ text, x, y, color, life: 1, vy: -40 });
  }

  // ---- Update ----
  function update(dt) {
    timeLeft -= dt;
    if (timeLeft <= 0) { timeLeft = 0; updateTimerUI(); endGame(); return; }
    updateTimerUI();

    // Elephant movement
    let move = 0;
    if (keys.left) move -= 1;
    if (keys.right) move += 1;
    ele.x += move * ele.speed * dt;
    const margin = ele.w/2;
    ele.x = Math.max(margin, Math.min(W - margin, ele.x));

    // Keeper movement (oscillates, gets faster as time goes)
    const intensity = 1 + (GAME_TIME - timeLeft) / GAME_TIME * 0.8;
    keeper.t += dt * keeper.speed * intensity;
    keeper.x = keeper.centerX + Math.sin(keeper.t + keeper.phase) * keeper.range
               + Math.sin(keeper.t * 2.3) * 18;

    // Ball follows elephant before shooting
    if (!ball.moving) {
      ball.x = ele.x;
      ball.y = SHOOT_LINE;
      if (shootQueued) { shoot(); }
    } else {
      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;
      ball.scale = Math.max(0.45, ball.y / SHOOT_LINE); // perspective shrink
      // bounce off side posts area
      if (ball.x < GOAL.x + 8 || ball.x > GOAL.x + GOAL.w - 8) {
        ball.vx *= -0.6;
      }

      // Reached goal line zone
      if (ball.y <= GOAL.postY) {
        resolveShot();
      }
    }
    shootQueued = false;

    // flashes
    for (const f of flashes) { f.life -= dt * 1.1; f.y += f.vy * dt; }
    flashes = flashes.filter(f => f.life > 0);
  }

  function resolveShot() {
    // Is ball within goal mouth horizontally?
    const inGoal = ball.x > GOAL.x + 6 && ball.x < GOAL.x + GOAL.w - 6;
    const keeperHalf = keeper.w / 2 + ball.r * 0.6;
    const saved = Math.abs(ball.x - keeper.x) < keeperHalf;

    if (inGoal && !saved) {
      score++;
      document.getElementById('scoreVal').textContent = score;
      addFlash('GOLO ! ⚽', ball.x, GOAL.postY + 30, '#fff0f7');
    } else if (saved) {
      addFlash('DEFESA 🧤', keeper.x, GOAL.postY + 30, '#7fdfff');
    } else {
      addFlash('FALHOU 😅', ball.x, GOAL.postY + 30, '#ff8fa3');
    }
    resetBall();
  }

  // ---- Draw ----
  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Green pitch stripes
    for (let i = 0; i < 12; i++) {
      ctx.fillStyle = i % 2 === 0 ? '#2d8a4e' : '#329954';
      ctx.fillRect(0, i * (H/12), W, H/12);
    }

    // Logo watermark (50% opacity, centered on the pitch)
    if (logoReady) {
      const lw = 250;
      const lh = lw * (logoImg.height / logoImg.width);
      ctx.save();
      ctx.globalAlpha = 0.5;
      ctx.drawImage(logoImg, W/2 - lw/2, (SHOOT_LINE + GOAL.postY)/2 - lh/2, lw, lh);
      ctx.restore();
    }

    // Penalty spot
    ctx.beginPath();
    ctx.arc(W/2, SHOOT_LINE - 30, 5, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.fill();

    drawGoal();

    // Keeper (draw before/under ball depending, keeper on goal line)
    drawKeeper();

    // Ball
    drawBall();

    // Elephant
    drawElephant();

    // Flashes
    ctx.textAlign = 'center';
    for (const f of flashes) {
      ctx.globalAlpha = Math.max(0, Math.min(1, f.life));
      ctx.font = '900 30px Trebuchet MS, sans-serif';
      ctx.fillStyle = f.color;
      ctx.strokeStyle = 'rgba(0,0,0,0.5)';
      ctx.lineWidth = 5;
      ctx.strokeText(f.text, f.x, f.y);
      ctx.fillText(f.text, f.x, f.y);
    }
    ctx.globalAlpha = 1;
  }

  function drawGoal() {
    const g = GOAL;
    // net
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 1.5;
    const step = 16;
    for (let x = g.x; x <= g.x + g.w; x += step) {
      ctx.beginPath(); ctx.moveTo(x, g.y); ctx.lineTo(x, g.postY); ctx.stroke();
    }
    for (let y = g.y; y <= g.postY; y += step) {
      ctx.beginPath(); ctx.moveTo(g.x, y); ctx.lineTo(g.x + g.w, y); ctx.stroke();
    }
    ctx.restore();

    // posts
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 9;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(g.x, g.postY);
    ctx.lineTo(g.x, g.y);
    ctx.lineTo(g.x + g.w, g.y);
    ctx.lineTo(g.x + g.w, g.postY);
    ctx.stroke();
  }

  function drawKeeper() {
    if (keeperReady) {
      const kw = 96;
      const kh = kw * (keeperImg.height / keeperImg.width); // ~119
      const feetY = GOAL.postY + 14; // stand on the goal line
      ctx.drawImage(keeperImg, keeper.x - kw/2, feetY - kh, kw, kh);
    } else {
      ctx.font = '70px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🧍', keeper.x, GOAL.postY - 28);
    }
  }

  function drawBall() {
    const s = ball.scale;
    ctx.font = (38 * s) + 'px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // shadow
    ctx.globalAlpha = 0.25;
    ctx.beginPath();
    ctx.ellipse(ball.x, ball.y + 18*s, 16*s, 6*s, 0, 0, Math.PI*2);
    ctx.fillStyle = '#000';
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillText('⚽', ball.x, ball.y);
  }

  function drawElephant() {
    // shadow
    ctx.globalAlpha = 0.25;
    ctx.beginPath();
    ctx.ellipse(ele.x, SHOOT_LINE + 48, 36, 11, 0, 0, Math.PI*2);
    ctx.fillStyle = '#000';
    ctx.fill();
    ctx.globalAlpha = 1;

    if (playerReady) {
      const ph = 180;
      const pw = ph * (playerImg.width / playerImg.height);
      const feetY = SHOOT_LINE + 52;
      ctx.drawImage(playerImg, ele.x - pw/2, feetY - ph, pw, ph);
    } else {
      ctx.font = '84px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🐘', ele.x, SHOOT_LINE + 4);
    }
  }

  // ---- Loop ----
  function loop(t) {
    if (state !== 'playing') { draw(); return; }
    if (!lastTime) lastTime = t;
    let dt = (t - lastTime) / 1000;
    lastTime = t;
    if (dt > 0.05) dt = 0.05; // clamp
    update(dt);
    if (state === 'playing') { draw(); requestAnimationFrame(loop); }
    else draw();
  }

  // ---- Controls ----
  // Keyboard
  let spaceHeld = false;
  window.addEventListener('keydown', (e) => {
    // Don't hijack keys while typing a name in the input
    if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
    if (e.code === 'ArrowLeft') { keys.left = true; e.preventDefault(); }
    if (e.code === 'ArrowRight') { keys.right = true; e.preventDefault(); }
    if (e.code === 'Space' || e.key === ' ') {
      e.preventDefault();
      // Space ONLY shoots, and only while playing. It never (re)starts the game —
      // use the on-screen button for that. Ignore auto-repeat / held key.
      if (e.repeat || spaceHeld) return;
      spaceHeld = true;
      if (state === 'playing') shootQueued = true;
    }
  });
  window.addEventListener('keyup', (e) => {
    if (e.code === 'ArrowLeft') keys.left = false;
    if (e.code === 'ArrowRight') keys.right = false;
    if (e.code === 'Space' || e.key === ' ') spaceHeld = false;
  });

  // Buttons
  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('replayBtn').addEventListener('click', startGame);
  document.getElementById('rankingBtn').addEventListener('click', showRanking);
  document.getElementById('rankingBackBtn').addEventListener('click', hideRanking);

  // Name entry (Top 10)
  document.getElementById('saveNameBtn').addEventListener('click', saveName);
  document.getElementById('nameInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); saveName(); }
  });

  // Touch controls
  function bindHold(id, on, off) {
    const el = document.getElementById(id);
    const press = (e) => { e.preventDefault(); on(); };
    const release = (e) => { e.preventDefault(); off && off(); };
    el.addEventListener('touchstart', press, { passive: false });
    el.addEventListener('touchend', release, { passive: false });
    el.addEventListener('touchcancel', release, { passive: false });
    el.addEventListener('mousedown', press);
    el.addEventListener('mouseup', release);
    el.addEventListener('mouseleave', release);
  }
  bindHold('leftBtn', () => keys.left = true, () => keys.left = false);
  bindHold('rightBtn', () => keys.right = true, () => keys.right = false);
  bindHold('shootBtn', () => { shootQueued = true; }, null);

  // Detect touch device -> show touch controls + adjust hint
  const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  if (isTouch) {
    document.getElementById('touch').classList.add('show');
    document.getElementById('pcHint').innerHTML =
      '◀ ▶ mover &nbsp;•&nbsp; <b>REMATE</b> ao centro para rematar';
  }

  // Initial render
  draw();
})();
</script>
</body>
</html>
